name: Release CLI

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      release_exists: ${{ steps.meta.outputs.release_exists }}
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(node -e "const fs=require('fs');const src=fs.readFileSync('cli/core/shared.ts','utf8');const m=src.match(/export const VERSION = '([^']+)'/);if(!m){process.exit(1)};process.stdout.write(m[1]);")"
          TAG="v${VERSION}"

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "release_exists=true" >>"${GITHUB_OUTPUT}"
          else
            echo "release_exists=false" >>"${GITHUB_OUTPUT}"
          fi

          echo "version=${VERSION}" >>"${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >>"${GITHUB_OUTPUT}"

  build:
    needs: meta
    if: needs.meta.outputs.release_exists != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_name: cli-darwin
            runs_on: macos-14
            specs: |
              bun-darwin-arm64:bri-darwin-arm64
              bun-darwin-x64:bri-darwin-x64
          - artifact_name: cli-linux
            runs_on: ubuntu-latest
            specs: |
              bun-linux-arm64:bri-linux-arm64
              bun-linux-x64:bri-linux-x64
          - artifact_name: cli-windows-x64
            runs_on: windows-latest
            specs: |
              bun-windows-x64:bri-windows-x64.exe
    runs-on: ${{ matrix.runs_on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./cli/build-release-binaries.sh

          SPECS=()
          while IFS= read -r line; do
            line="${line#"${line%%[![:space:]]*}"}"
            line="${line%"${line##*[![:space:]]}"}"
            [ -n "${line}" ] || continue
            SPECS+=("${line}")
          done <<'EOF'
          ${{ matrix.specs }}
          EOF

          ./cli/build-release-binaries.sh dist/cli-release "${SPECS[@]}"

      - name: Smoke test release assets
        shell: bash
        run: |
          set -euo pipefail

          SPECS=()
          while IFS= read -r line; do
            line="${line#"${line%%[![:space:]]*}"}"
            line="${line%"${line##*[![:space:]]}"}"
            [ -n "${line}" ] || continue
            SPECS+=("${line}")
          done <<'EOF'
          ${{ matrix.specs }}
          EOF

          for spec in "${SPECS[@]}"; do
            asset="${spec##*:}"
            asset_path="dist/cli-release/${asset}"
            if [[ ! -f "${asset_path}" ]]; then
              echo "missing built asset: ${asset_path}" >&2
              exit 1
            fi

            chmod +x "${asset_path}" 2>/dev/null || true
            "${asset_path}" --version >/dev/null
          done

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/cli-release/*
          if-no-files-found: error

  release:
    needs:
      - meta
      - build
    if: needs.meta.outputs.release_exists != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/collected

      - name: Assemble release assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist/cli-release
          EXPECTED=(
            "bri-darwin-arm64"
            "bri-darwin-x64"
            "bri-linux-arm64"
            "bri-linux-x64"
            "bri-windows-x64.exe"
          )

          for asset in "${EXPECTED[@]}"; do
            src="$(find dist/collected -type f -name "${asset}" -print -quit)"
            if [ -z "${src}" ]; then
              echo "missing required asset: ${asset}" >&2
              exit 1
            fi
            cp "${src}" "dist/cli-release/${asset}"
          done

          cd dist/cli-release
          sha256sum bri-* >SHA256SUMS
          ls -lh

      - name: Publish GitHub release with gh CLI
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ needs.meta.outputs.tag }}"
          gh release create "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "bri ${TAG}" \
            --generate-notes \
            dist/cli-release/bri-darwin-arm64 \
            dist/cli-release/bri-darwin-x64 \
            dist/cli-release/bri-linux-arm64 \
            dist/cli-release/bri-linux-x64 \
            dist/cli-release/bri-windows-x64.exe \
            dist/cli-release/SHA256SUMS

  skip-existing-release:
    needs: meta
    if: needs.meta.outputs.release_exists == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skip existing release tag
        run: echo "Release ${{ needs.meta.outputs.tag }} already exists. Skipping."
