name: Release CLI

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      release_exists: ${{ steps.meta.outputs.release_exists }}
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(node -e "const fs=require('fs');const src=fs.readFileSync('cli/core/shared.ts','utf8');const m=src.match(/export const VERSION = '([^']+)'/);if(!m){process.exit(1)};process.stdout.write(m[1]);")"
          TAG="v${VERSION}"

          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "release_exists=true" >>"${GITHUB_OUTPUT}"
          else
            echo "release_exists=false" >>"${GITHUB_OUTPUT}"
          fi

          echo "version=${VERSION}" >>"${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >>"${GITHUB_OUTPUT}"
        env:
          GH_TOKEN: ${{ github.token }}

  release:
    needs: meta
    if: needs.meta.outputs.release_exists != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Publish GitHub release with gh CLI
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ needs.meta.outputs.tag }}"
          gh release create "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "bri ${TAG}" \
            --generate-notes

  skip-existing-release:
    needs: meta
    if: needs.meta.outputs.release_exists == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skip existing release tag
        run: echo "Release ${{ needs.meta.outputs.tag }} already exists. Skipping."
