services:
  backend:
    build:
      context: ./backend
    ports:
      - "5002:5002"
    env_file:
      - ./backend/.env
    volumes:
      - go_data:/root/data
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    restart: always
    ports:
      - "8083:80"
      - "5443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  go_data:

networks:
  app-network:
    driver: bridge
